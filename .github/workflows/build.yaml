name: Build Rhinestone Mockestrator Image

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  IMAGE: public.ecr.aws/o0l1k5e4/rhinestone-mockestrator

jobs:
  build-amd64:
    name: Build AMD64 image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ECR_ACCOUNT }}:role/github-magiclabs-role
          aws-region: us-east-1

      - name: Login to Amazon ECR (public)
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build and push AMD64 image
        run: |
          docker build --platform linux/amd64 -t $IMAGE:${{ github.sha }}-amd64 .
          docker push $IMAGE:${{ github.sha }}-amd64

  build-arm64:
    name: Build ARM64 image
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ECR_ACCOUNT }}:role/github-magiclabs-role
          aws-region: us-east-1

      - name: Login to Amazon ECR (public)
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build and push ARM64 image
        run: |
          docker build --platform linux/arm64 -t $IMAGE:${{ github.sha }}-arm64 .
          docker push $IMAGE:${{ github.sha }}-arm64

  merge-manifests:
    name: Merge multi-arch manifest
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ECR_ACCOUNT }}:role/github-magiclabs-role
          aws-region: us-east-1

      - name: Login to Amazon ECR (public)
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t $IMAGE:${{ github.sha }} \
            $IMAGE:${{ github.sha }}-amd64 \
            $IMAGE:${{ github.sha }}-arm64

      - name: Tag latest (push to main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker buildx imagetools create \
            -t $IMAGE:latest \
            $IMAGE:${{ github.sha }}-amd64 \
            $IMAGE:${{ github.sha }}-arm64
